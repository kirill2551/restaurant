<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Наше меню</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">

        <h1 class="text-center mb-4">Наше меню</h1>
        <a href="{% url 'cart' %}">Моя корзина</a>
        <div class="row">

{% for category in categories %}
    <div class="category-section mt-5">
        <h2 class="text-primary border-bottom pb-2">{{ category.name }}</h2>
        <div class="row mt-3">
            {% for dish in category.dishes.all %}
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">{{ dish.name }}</h5>
                            <p class="card-text text-muted">{{ dish.description }}</p>
                            <p class="fw-bold fs-5">{{ dish.price }} грн1.</p>
                           <form action="{% url 'add_to_cart' dish.id %}" method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-outline-success w-100">В корзину</button>
</form>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endfor %}

        </div>
        <div class="text-center mt-3">
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-danger">Выйти</button>
            </form>
        </div>
    </div>
</body>
</html>
